name: Fetch Isaac Davydov Transcripts

on:
  schedule:
    - cron: '0 20 */2 * *'
  workflow_dispatch:

jobs:
  fetch-transcripts:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yt-dlp youtube-transcript-api requests

      - name: Fetch new transcripts
        env:
          WEBSHARE_PROXY_URL: ${{ secrets.WEBSHARE_PROXY_URL }}
        run: python fetch_transcripts.py

      - name: Commit transcripts and seen_videos.json
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add seen_videos.json transcripts/
          git diff --staged --quiet || git commit -m "chore: add new transcripts [skip ci]"
          git push
