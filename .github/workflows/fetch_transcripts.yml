name: Fetch Isaac Davydov Transcripts

on:
  schedule:
    # Runs daily at 8 PM UTC. Adjust to your preferred time if needed.
    # Use https://crontab.guru to convert to your timezone.
    - cron: '0 20 * * *'
  workflow_dispatch:
    # Allows you to trigger this manually from the GitHub Actions tab anytime.

jobs:
  fetch-transcripts:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to commit seen_videos.json back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install \
            youtube-transcript-api \
            yt-dlp \
            google-auth \
            google-api-python-client

      - name: Fetch new transcripts and upload to Drive
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
        run: python fetch_transcripts.py

      - name: Commit updated seen_videos.json
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add seen_videos.json
          git diff --staged --quiet || git commit -m "chore: update seen videos list [skip ci]"
          git push
