name: Fetch Isaac Davydov Transcripts

on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  fetch-transcripts:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yt-dlp google-auth google-api-python-client

      - name: Fetch new transcripts and upload to Drive
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: python fetch_transcripts.py

      - name: Commit updated seen_videos.json
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add seen_videos.json
          git diff --staged --quiet || git commit -m "chore: update seen videos list [skip ci]"
          git push
